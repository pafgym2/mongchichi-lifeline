name: 데일리 뉴스 브리핑

on:
  schedule:
    # GitHub Actions cron은 UTC 기준. 01:00 UTC = 한국시간(KST) 오전 10:00.
    - cron: "0 1 * * *"
  workflow_dispatch: {} # 수동 실행 버튼 (테스트용)

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 의존성 설치
        working-directory: news-briefing
        run: npm install
      - name: 브리핑 전송
        working-directory: news-briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node src/daily.js
