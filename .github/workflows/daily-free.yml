name: 데일리 브리핑 (무료 버전 · 요약 없음)

on:
  workflow_dispatch: {} # 수동 실행 전용 (요약 없는 무료 버전 비교용)

jobs:
  briefing-free:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 의존성 설치
        working-directory: news-briefing
        run: npm install
      - name: 무료 버전 전송
        working-directory: news-briefing
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: node src/dailyFree.js
