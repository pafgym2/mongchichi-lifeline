name: 포트폴리오 일일 리포트

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch: {}

jobs:
  portfolio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 의존성 설치
        working-directory: news-briefing
        run: npm install
      - name: 포트폴리오 리포트 전송
        working-directory: news-briefing
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: node src/portfolio.js
