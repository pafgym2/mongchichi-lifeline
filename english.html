<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다윤이 화상영어 — 주간 스크립트</title>
<style>
  :root{
    --bg:#fff7fb; --card:#ffffff; --ink:#33303a; --soft:#7a7686;
    --pink:#ff7eb3; --pink-d:#e85a98; --blue:#5aa9ff; --mint:#4fd1b5;
    --yellow:#ffd166; --line:#f0e6ee; --shadow:0 6px 18px rgba(232,90,152,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6;
    padding-bottom:40px; font-size:17px;
  }
  header{
    position:sticky; top:0; z-index:30;
    background:linear-gradient(135deg,var(--pink),var(--pink-d));
    color:#fff; padding:14px 16px 12px; box-shadow:0 4px 14px rgba(232,90,152,.25);
  }
  header h1{margin:0; font-size:18px; font-weight:800; letter-spacing:-.3px;}
  header p{margin:3px 0 0; font-size:12.5px; opacity:.92;}
  .weekbar{display:flex; gap:8px; padding:10px 12px 0; background:#fff; max-width:680px; margin:0 auto;}
  .weekbar button{
    flex:1; border:2px solid var(--pink); background:#fff; color:var(--pink-d);
    font-weight:800; font-size:14px; padding:9px 0; border-radius:12px; cursor:pointer;
  }
  .weekbar button.on{background:var(--pink); color:#fff;}
  .tabs{
    display:flex; gap:6px; overflow-x:auto; padding:10px 12px;
    background:#fff; position:sticky; top:62px; z-index:25;
    border-bottom:1px solid var(--line); scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto; border:none; cursor:pointer; font-weight:700;
    padding:8px 13px; border-radius:999px; font-size:14px;
    background:#fbeef5; color:var(--pink-d); white-space:nowrap; transition:.15s;
  }
  .tab.active{background:var(--pink); color:#fff; box-shadow:var(--shadow);}
  main{padding:16px 14px 0; max-width:680px; margin:0 auto;}
  .panel{display:none; animation:fade .25s ease;}
  .panel.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .daytitle{font-size:21px; font-weight:800; margin:4px 0 14px; letter-spacing:-.4px;}
  .daytitle .emoji{margin-right:6px;}
  .seg{background:var(--card); border-radius:16px; padding:14px 15px; margin-bottom:14px; box-shadow:var(--shadow); border:1px solid var(--line);}
  .seg h3{margin:0 0 10px; font-size:15.5px; font-weight:800; display:flex; align-items:center; gap:8px;}
  .time{margin-left:auto; font-size:12px; font-weight:700; color:#fff; background:var(--blue); padding:2px 9px; border-radius:999px;}
  .seg.warm h3 .time{background:var(--mint);}
  .seg.words h3 .time{background:var(--yellow); color:#7a5a00;}
  .seg.main h3 .time{background:var(--pink);}
  .seg.role h3 .time{background:#a78bfa;}
  .seg.wrap h3 .time{background:#34c77b;}
  .line{margin:5px 0; padding-left:30px; position:relative;}
  .line .who{position:absolute; left:0; top:0; font-weight:800; font-size:13px; width:24px; text-align:center; border-radius:6px; padding:1px 0;}
  .line.p .who{background:#e7f0ff; color:#2b6fd1;}
  .line.d .who{background:#ffe6f0; color:var(--pink-d);}
  .line .ko{color:var(--soft); font-size:13.5px; display:block; margin-top:1px;}
  .say-btn{border:none; cursor:pointer; background:#eaf4ff; color:#2b6fd1; border-radius:9px; font-size:14px; line-height:1; padding:3px 8px; margin-left:6px; vertical-align:middle; transition:.12s;}
  .say-btn:hover{background:#d6e9ff;}
  .say-btn:active{transform:scale(.9);}
  .say-btn.speaking{background:var(--pink); color:#fff;}
  table.words .say-btn{margin-left:8px;}
  .sentence .say-btn{background:#fff;color:var(--pink-d);}
  .pill[data-say]{cursor:pointer;}
  .repeat{background:#fff4f9; border:1px dashed var(--pink); color:var(--pink-d); border-radius:10px; padding:7px 11px; font-size:13.5px; font-weight:700; margin:8px 0; text-align:center;}
  .sentence{background:linear-gradient(135deg,#fff6da,#ffe9c2); border-radius:12px; padding:11px 13px; font-weight:800; margin-top:8px; font-size:16px;}
  .sentence small{display:block; font-weight:600; color:#8a6d2f; font-size:13px; margin-top:2px;}
  table.words{width:100%; border-collapse:collapse; margin-top:4px;}
  table.words td{padding:7px 8px; border-bottom:1px solid var(--line); font-size:15px;}
  table.words tr:last-child td{border-bottom:none;}
  table.words .en{font-weight:800;}
  table.words .ko{color:var(--soft); font-size:13.5px;}
  table.words .say{color:var(--blue); font-weight:700; font-size:13.5px; text-align:right;}
  .tip{background:#f3fff9; border-left:4px solid var(--mint); border-radius:0 12px 12px 0; padding:10px 13px; font-size:13.5px; color:#2c5e4e; margin-top:6px;}
  .tip b{color:#1f8a6b;}
  .pill{display:inline-block; background:#fbeef5; color:var(--pink-d); font-weight:700; border-radius:999px; padding:3px 10px; font-size:12.5px; margin:3px 4px 3px 0;}
  .howto{background:var(--card); border-radius:16px; padding:16px; box-shadow:var(--shadow); border:1px solid var(--line);}
  .howto table{width:100%; border-collapse:collapse;}
  .howto td{padding:9px 6px; border-bottom:1px solid var(--line); font-size:14px; vertical-align:top;}
  .howto .wk{font-weight:800; color:var(--pink-d); white-space:nowrap;}
  .stamp{text-align:center; font-size:15px; font-weight:800; color:#34c77b; margin-top:10px;}
  .speakhint{background:#eaf4ff;border-radius:12px;padding:9px 12px;font-size:13px;color:#2b6fd1;margin-bottom:12px;}
  .fontbtn{position:fixed; right:14px; bottom:16px; z-index:40; display:flex; gap:8px;}
  .fontbtn button{width:44px; height:44px; border-radius:50%; border:none; cursor:pointer; background:#fff; box-shadow:0 4px 14px rgba(0,0,0,.15); font-size:18px; font-weight:800; color:var(--pink-d);}
  .note{font-size:12.5px; color:var(--soft); text-align:center; margin:18px 0 0;}
</style>
</head>
<body>

<header>
  <h1>🗣️ 다윤이 화상영어 스크립트</h1>
  <p>하루 25분 · 매주 같은 7일을 점점 깊게 반복 · 🔊 누르면 읽어줘요</p>

</div>

<div class="tabs" id="tabs"></div>
<main id="main"></main>

/* ---------- 발음(음성) ---------- */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function enPart(s){ const m=String(s).match(/^[^가-힣]+/); return (m?m[0]:s).trim(); }
function sayBtn(text){ return `<button class="say-btn" data-say="${esc(text)}" aria-label="발음 듣기">🔊</button>`; }
let enVoice=null;
function pickVoice(){ const vs=window.speechSynthesis?window.speechSynthesis.getVoices():[]; if(!vs.length) return;
  enVoice = vs.find(v=>/en[-_]US/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || null; }
if('speechSynthesis' in window){ pickVoice(); window.speechSynthesis.onvoiceschanged = pickVoice; }
function speak(text, btn){
  if(!('speechSynthesis' in window)){ alert('이 브라우저는 음성 재생을 지원하지 않아요. 크롬/사파리 최신 버전을 권장해요.'); return; }
  const clean = String(text).replace(/[()_]/g,' ').replace(/\s+/g,' ').trim();
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(clean); u.lang='en-US'; u.rate=0.85; u.pitch=1.05;
  if(!enVoice) pickVoice(); if(enVoice) u.voice=enVoice;
  if(btn){ u.onstart=()=>btn.classList.add('speaking'); const off=()=>btn.classList.remove('speaking'); u.onend=off; u.onerror=off; }
  window.speechSynthesis.speak(u);
}
document.addEventListener('click',e=>{ const b=e.target.closest('[data-say]'); if(b){ e.preventDefault(); speak(b.getAttribute('data-say'), b); } });

}

  <div class="speakhint" style="margin-top:14px">🔊 단어·문장·대사 옆 버튼을 누르면 영어 발음을 읽어줘요. (인터넷 없이 폰·컴퓨터에서 바로)</div>
  <div class="speakhint" style="background:#fff4f9;color:var(--pink-d)">위의 <b>1주차/2주차 세트</b> 버튼으로 주제를 바꿔요. 1주차에 익숙해지면 2주차로!</div>
  <div class="seg warm" style="margin-top:4px">
    <h3>${WARMUP.title}<span class="time">${WARMUP.time}</span></h3>
    <p style="font-size:13px;color:var(--soft);margin:-4px 0 8px">${WARMUP.note}</p>
    ${linesHTML(WARMUP.lines)}
    <div style="margin-top:10px">${WARMUP.pills.map(p=>`<span class="pill" data-say="${esc(enPart(p))}">${p} 🔊</span>`).join('')}</div>
  </div></div>`;
}
function dayHTML(d){

  h+=`<div class="seg warm"><h3>☀️ 워밍업 (매일 동일)<span class="time">3분</span></h3>${linesHTML(WARMUP.lines)}</div>`;
  if(d.interview){

    h+=`<div class="seg role"><h3>🆘 막혔을 때 비상 표현<span class="time">꼭!</span></h3>
      ${d.sos.map(s=>`<div style="margin:8px 0"><b style="color:var(--pink-d)">${s[0]}</b><br><span style="font-weight:800">${s[1]}</span> ${sayBtn(s[1])}<br><span class="ko" style="color:var(--soft);font-size:13.5px">${s[2]}</span></div>`).join('')}</div>`;
    h+=`<div class="stamp">7일 완성 도장 쾅 🟢🎉</div>`;
  } else {
    h+=`<div class="seg words"><h3>📝 새 단어 + 오늘 문장<span class="time">4분</span></h3>
      <table class="words">${d.words.map(w=>`<tr><td class="en">${w[0]} ${sayBtn(w[0])}</td><td class="ko">${w[1]}</td><td class="say">${w[2]}</td></tr>`).join('')}</table>
      <div class="sentence">${d.sentence[0]} ${sayBtn(d.sentence[0])}${d.sentence[1]?`<small>${d.sentence[1]}</small>`:''}</div></div>`;
    h+=`<div class="seg main"><h3>💬 메인 대화<span class="time">8분</span></h3>${linesHTML(d.main)}<div class="repeat">🔁 같은 대화 한 번 더 — 이번엔 더 빠르게!</div></div>`;
    h+=`<div class="seg role"><h3>🎭 응용 롤플레이<span class="time">6분</span></h3>${linesHTML(d.role)}</div>`;
    h+=`<div class="seg wrap"><h3>✅ 마무리 복습<span class="time">4분</span></h3>${linesHTML(d.wrap)}<div class="stamp">도장 쾅 🟢</div></div>`;
  }
  h+=`<div class="tip">👩 <b>부모 코칭:</b> ${d.tip}</div>`;
  return h;
}
function addTab(label, html, active){
  const b=document.createElement('button'); b.className='tab'+(active?' active':''); b.textContent=label;
  const p=document.createElement('div'); p.className='panel'+(active?' active':''); p.innerHTML=html;
  b.onclick=()=>{ try{window.speechSynthesis&&window.speechSynthesis.cancel();}catch(e){}
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(t=>t.classList.remove('active'));
    b.classList.add('active'); p.classList.add('active'); window.scrollTo({top:0,behavior:'smooth'}); };
  tabsEl.appendChild(b); mainEl.appendChild(p); panels.push(p);
}
function loadWeek(wi){
  try{window.speechSynthesis&&window.speechSynthesis.cancel();}catch(e){}
  document.getElementById('wk0').classList.toggle('on', wi===0);
  document.getElementById('wk1').classList.toggle('on', wi===1);
  tabsEl.innerHTML=''; mainEl.innerHTML=''; panels=[];
  addTab("📋 안내", howHTML(), true);
  WEEKS[wi].forEach((d,i)=> addTab(`${d.emoji} D${i+1}`, dayHTML(d), false));
  window.scrollTo({top:0,behavior:'smooth'});
}
