<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다윤이 영어 보상 — 꾸미기</title>
<style>
  :root{--bg:#fff7fb;--ink:#33303a;--soft:#7a7686;--pink:#ff7eb3;--pink-d:#e85a98;--mint:#4fd1b5;--line:#f0e6ee;--shadow:0 6px 18px rgba(232,90,152,.12);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;padding-bottom:36px;}
  header{background:linear-gradient(135deg,var(--pink),var(--pink-d));color:#fff;padding:14px 16px;box-shadow:0 4px 14px rgba(232,90,152,.25);}
  header h1{margin:0;font-size:18px;font-weight:800;}
  header p{margin:3px 0 0;font-size:12.5px;opacity:.92;}
  main{max-width:520px;margin:0 auto;padding:14px;}
  .starbar{display:flex;align-items:center;gap:10px;background:#fff;border-radius:16px;padding:12px 14px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:14px;}
  .starbar .cnt{font-size:22px;font-weight:800;color:var(--pink-d);}
  .starbar .lab{font-size:13px;color:var(--soft);}
  .starbar button{margin-left:auto;border:none;background:var(--mint);color:#063;font-weight:800;border-radius:12px;padding:10px 14px;font-size:14px;cursor:pointer;}
  .starbar button:active{transform:scale(.96);}
  .stage{position:relative;width:300px;max-width:88vw;aspect-ratio:1/1;margin:0 auto 14px;border-radius:22px;overflow:hidden;box-shadow:var(--shadow);border:4px solid #fff;}
  .stage.framed{border:6px solid #ffd34d;box-shadow:0 0 0 4px #ff9ec4,0 6px 18px rgba(232,90,152,.25);}
  .stage img{width:100%;height:100%;object-fit:cover;display:block;}
  .stk{position:absolute;transform:translate(-50%,-50%);font-size:34px;line-height:1;pointer-events:none;filter:drop-shadow(0 1px 1px rgba(0,0,0,.25));display:none;}
  .stk.on{display:block;}
  h2{font-size:15px;font-weight:800;margin:6px 2px 10px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:10px;}
  .item{background:#fff;border:2px solid var(--line);border-radius:14px;padding:10px 6px 8px;text-align:center;cursor:pointer;position:relative;transition:.12s;}
  .item:active{transform:scale(.96);}
  .item .ico{font-size:26px;line-height:1;}
  .item .nm{font-size:12px;font-weight:700;margin-top:5px;}
  .item .cost{font-size:11px;color:var(--soft);margin-top:2px;}
  .item.worn{border-color:var(--pink);background:#fff4f9;}
  .item.locked{opacity:.6;}
  .item.locked .lock{position:absolute;top:6px;right:8px;font-size:13px;}
  .hint{font-size:12.5px;color:var(--soft);text-align:center;margin:14px 0 0;}
  .reset{display:block;margin:16px auto 0;background:none;border:none;color:var(--soft);font-size:12px;text-decoration:underline;cursor:pointer;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--pink-d);color:#fff;font-weight:700;font-size:14px;padding:10px 18px;border-radius:999px;opacity:0;transition:.25s;pointer-events:none;z-index:50;}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header>
  <h1>🎀 다윤이 영어 보상 — 꾸미기</h1>
  <p>영어 잘했을 때 ⭐을 모아서, 내 사진을 예쁘게 꾸며요!</p>
</header>

  {id:"rainbow", nm:"무지개",   ico:"🌈", cost:4},
  {id:"crown",   nm:"왕관",     ico:"👑", cost:5},
  {id:"frame",   nm:"반짝 프레임", ico:"🖼️", cost:5},
];
const KEY="dayoon_photo_avatar_v1";
let st={stars:0, unlocked:[], worn:[]};
try{const s=localStorage.getItem(KEY); if(s) st=JSON.parse(s);}catch(e){}
function save(){ try{localStorage.setItem(KEY, JSON.stringify(st));}catch(e){} }
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1500);}
function addStar(){ st.stars++; save(); render(); toast("⭐ 잘했어요! +1"); }
function clickItem(it){
  if(!st.unlocked.includes(it.id)){
    if(st.stars>=it.cost){ st.stars-=it.cost; st.unlocked.push(it.id); st.worn.push(it.id); save(); render(); toast(it.ico+" "+it.nm+" 획득!"); }
    else{ toast("⭐ "+(it.cost-st.stars)+"개 더 모아요!"); }
  } else {
    const i=st.worn.indexOf(it.id);
    if(i>=0) st.worn.splice(i,1); else st.worn.push(it.id);
    save(); render();
  }
}
function resetAll(){ if(confirm("정말 처음부터 다시 시작할까요? 모은 ⭐과 아이템이 사라져요.")){ st={stars:0,unlocked:[],worn:[]}; save(); render(); } }
function render(){
  document.getElementById('starCnt').textContent=st.stars;
  ITEMS.forEach(it=>{
    if(it.id==='frame'){ document.getElementById('stage').classList.toggle('framed', st.worn.includes('frame')); return; }
    const el=document.getElementById('s_'+it.id); if(el) el.classList.toggle('on', st.worn.includes(it.id));
  });
  const g=document.getElementById('grid'); g.innerHTML='';
  ITEMS.forEach(it=>{
    const owned=st.unlocked.includes(it.id), worn=st.worn.includes(it.id);
    const d=document.createElement('div');
    d.className='item'+(worn?' worn':'')+(owned?'':' locked');
    d.innerHTML='<div class="ico">'+it.ico+'</div><div class="nm">'+it.nm+'</div>'+
      (owned?('<div class="cost">'+(worn?'붙이는 중':'눌러서 붙이기')+'</div>'):('<div class="cost">⭐ '+it.cost+'</div><span class="lock">🔒</span>'));
    d.onclick=()=>clickItem(it);
    g.appendChild(d);
  });
}
render();
</script>
</body>
</html>
